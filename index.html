<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Karaoke na śląsku - tabelka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
/* Scrollable region: horizontal scroll on narrow screens keeps the day
   columns aligned; max-height gives a sticky header on desktop and mobile. */
.table-scroll { max-height: 85vh; overflow: auto; }
.table-scroll thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: #fff;
}
/* Time cells never wrap; venue names may. */
.table-scroll td, .table-scroll th { white-space: nowrap; }
.table-scroll td.venue, .table-scroll th.venue { white-space: normal; }

/* Identity cell (mobile only): venue name over "Miasto · Prowadzący". */
.table-scroll .identity      { white-space: normal; }
.table-scroll .i-name a      { font-weight: 600; }
.table-scroll .i-meta        { color: #6c757d; font-size: .85em; }

/* Desktop keeps the wide Miasto / Miejsce / Prowadzący columns. On phones
   those collapse into one frozen identity column that stays visible while the
   day columns are swiped horizontally. */
@media (max-width: 575.98px) {
  .table-scroll { font-size: .8rem; }
  .table-scroll th.identity, .table-scroll td.identity {
    position: sticky;
    left: 0;
    z-index: 1;
    width: 9.5rem;
    min-width: 9.5rem;
  }
  .table-scroll thead th.identity { z-index: 3; }
}
    </style>
</head>
<body>
    <div class="container">
        <div id="data-warnings" class="alert alert-warning d-none" role="alert"></div>

        <p align="center"><strong><b>Uwaga!</b></strong> Proszę zawsze sprawdzić u źródła. W razie pomyłek proszę o kontakt na <a href="http://facebook.com/karaokenaslasku/">FB</a>.</p>
        <p id="last-updated" class="text-center text-muted small mb-2"></p>
        <input type="search" id="search" class="form-control mb-2" placeholder="Szukaj: miasto, miejsce, prowadzący…" autocomplete="off">
        <p id="no-results" class="text-center text-muted d-none">Brak wyników.</p>
        <h1 class="h5 text-center fw-bold mb-2">Lista karaoke na Śląsku</h1>
        <div class="table-scroll">
        <table class="table table-striped table-bordered table-sm table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th class="identity d-md-none">Miejsce</th>
                    <th class="venue d-none d-md-table-cell">Miasto</th>
                    <th class="venue d-none d-md-table-cell">Miejsce</th>
                    <th class="venue d-none d-md-table-cell">Prowadzący</th>
                    <th>Pn</th>
                    <th>Wt</th>
                    <th>Śr</th>
                    <th>Czw</th>
                    <th>Pt</th>
                    <th>Sb</th>
                    <th>Nd</th>
                </tr>
            </thead>
            <tbody id="karaoke-rows">
                <tr>
                    <td colspan="10" class="text-center">Ładowanie danych...</td>
                </tr>
            </tbody>
        </table>
        </div>

        <p><a href="https://karaoke.nowak.io/">Karaoke on śląsku - tabelka</a></p>
        <p><a href="http://facebook.com/karaokenaslasku/">Komentowanie na FB</a></p>
        <p><a href="https://github.com/lukenowak/karaoke/">Kod</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
