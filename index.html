<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Karaoke na śląsku - tabelka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
.tableFixHead          { overflow: auto; height: 100px; }
.tableFixHead thead th { position: sticky; top: 0; z-index: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div id="data-warnings" class="alert alert-warning d-none" role="alert"></div>

        <p align="center"><strong><b>Uwaga!</b></strong> Proszę zawsze sprawdzić u źródła. W razie pomyłek proszę o kontakt na <a href="http://facebook.com/karaokenaslasku/">FB</a>.</p>
        <p id="last-updated" class="text-center text-muted small mb-2"></p>
        <table class="table table-stripped table-bordered table-sm table-hover tableFixHead">
            <caption style="caption-side: top; text-align: center; font-weight: bold;">Lista karaoke na Śląsku</caption>
            <thead>
                <tr>
                    <th>Miasto</th>
                    <th>Miejsce</th>
                    <th>Prowadzący</th>
                    <th>Pn</th>
                    <th>Wt</th>
                    <th>Śr</th>
                    <th>Czw</th>
                    <th>Pt</th>
                    <th>Sb</th>
                    <th>Nd</th>
                </tr>
            </thead>
            <tbody id="karaoke-rows">
                <tr>
                    <td colspan="10" class="text-center">Ładowanie danych...</td>
                </tr>
            </tbody>
        </table>

        <p><a href="https://karaoke.nowak.io/">Karaoke on śląsku - tabelka</a></p>
        <p><a href="http://facebook.com/karaokenaslasku/">Komentowanie na FB</a></p>
        <p><a href="https://github.com/lukenowak/karaoke/">Kod</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
